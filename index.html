<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔐 BIO VIP ACCOUNT</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root[data-theme="light"] {
  --bg: #f0f4ff;
  --bg2: #e6ecff;
  --card: #ffffff;
  --card2: #f8faff;
  --border: rgba(0,0,0,0.08);
  --shadow: 0 20px 60px rgba(79,119,247,0.12);
  --text: #1a1f36;
  --muted: #7b83a6;
  --input-bg: #f4f6ff;
  --input-border: rgba(79,119,247,0.2);
  --accent: #4f77f7;
  --accent2: #7b5cf5;
  --success: #10b981;
  --danger: #ef4444;
  --toggle-bg: #dde3f7;
  --orb1: rgba(79,119,247,0.12);
  --orb2: rgba(123,92,245,0.10);
  --orb3: rgba(16,185,129,0.08);
}

:root[data-theme="dark"] {
  --bg: #080c14;
  --bg2: #0d1424;
  --card: #111827;
  --card2: #0f172a;
  --border: rgba(255,255,255,0.07);
  --shadow: 0 32px 80px rgba(0,0,0,0.5);
  --text: #e8edf5;
  --muted: #6b7a99;
  --input-bg: #0a1020;
  --input-border: rgba(79,119,247,0.25);
  --accent: #4f8ef7;
  --accent2: #7c5cfc;
  --success: #22d3a5;
  --danger: #f25c6e;
  --toggle-bg: #1e293b;
  --orb1: rgba(79,142,247,0.18);
  --orb2: rgba(123,92,252,0.15);
  --orb3: rgba(34,211,165,0.10);
}

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  transition: background 0.4s, color 0.4s;
}

/* Ambient orbs */
.bg-ambient { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
.orb {
  position: absolute; border-radius: 50%;
  animation: drift 14s ease-in-out infinite alternate;
}
.orb-1 { width: 600px; height: 600px; background: var(--orb1); filter: blur(90px); top: -200px; left: -150px; animation-delay: 0s; }
.orb-2 { width: 450px; height: 450px; background: var(--orb2); filter: blur(80px); bottom: -100px; right: -80px; animation-delay: -5s; }
.orb-3 { width: 300px; height: 300px; background: var(--orb3); filter: blur(70px); top: 50%; left: 55%; animation-delay: -9s; }
@keyframes drift {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(25px,18px) scale(1.06); }
}

/* Pattern bg */
.bg-dots {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: radial-gradient(circle, var(--border) 1px, transparent 1px);
  background-size: 28px 28px;
}

/* Theme toggle */
.theme-toggle {
  position: fixed; top: 20px; right: 20px; z-index: 100;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 8px 14px;
  display: flex; align-items: center; gap: 8px;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  transition: all 0.3s;
  font-size: 13px; font-weight: 600; color: var(--muted);
  user-select: none;
}
.theme-toggle:hover { box-shadow: 0 6px 24px rgba(79,119,247,0.2); color: var(--accent); }
.toggle-track {
  width: 38px; height: 20px;
  background: var(--toggle-bg);
  border-radius: 20px; position: relative;
  transition: background 0.3s;
}
.toggle-thumb {
  position: absolute; top: 3px; left: 3px;
  width: 14px; height: 14px;
  background: var(--accent);
  border-radius: 50%;
  transition: transform 0.3s;
}
[data-theme="dark"] .toggle-thumb { transform: translateX(18px); }
[data-theme="dark"] .toggle-track { background: #2d3a5a; }

/* Wrapper */
.wrapper {
  position: relative; z-index: 10;
  width: 100%; max-width: 440px;
  padding: 20px;
  animation: fadeUp 0.7s ease both;
}

/* Logo area */
.logo {
  text-align: center;
  margin-bottom: 28px;
  animation: fadeDown 0.6s ease both;
}
.logo-img {
  width: 72px; height: 72px;
  border-radius: 20px;
  object-fit: cover;
  margin-bottom: 10px;
  box-shadow: 0 8px 32px rgba(79,119,247,0.25);
  border: 2px solid rgba(79,119,247,0.2);
}
.logo-name {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 800;
  letter-spacing: 0.5px;
  color: var(--text);
  line-height: 1.2;
}
.logo-name span { color: var(--accent); }
.logo-sub {
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  margin-top: 4px;
  font-weight: 600;
}

/* Card */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 36px;
  box-shadow: var(--shadow);
  transition: background 0.4s, border-color 0.4s;
}

.card-title {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 4px;
  color: var(--text);
}
.card-subtitle {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 28px;
  font-weight: 400;
}

/* Tab switcher */
.tabs {
  display: flex;
  background: var(--input-bg);
  border-radius: 12px;
  padding: 4px;
  margin-bottom: 24px;
  border: 1px solid var(--border);
}
.tab-btn {
  flex: 1; padding: 9px;
  border: none; background: transparent;
  border-radius: 9px;
  font-family: 'Nunito', sans-serif;
  font-size: 13px; font-weight: 700;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.25s;
  letter-spacing: 0.3px;
}
.tab-btn.active {
  background: var(--card);
  color: var(--accent);
  box-shadow: 0 2px 12px rgba(79,119,247,0.15);
}

/* Fields */
.field { margin-bottom: 18px; }
.field label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.input-wrap { position: relative; }
.input-icon {
  position: absolute; left: 14px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted); pointer-events: none; display: flex;
  transition: color 0.2s;
}
.input-icon svg { width: 15px; height: 15px; }

input {
  width: 100%;
  padding: 12px 14px 12px 42px;
  background: var(--input-bg);
  border: 1.5px solid var(--input-border);
  border-radius: 12px;
  color: var(--text);
  font-size: 14px;
  font-family: 'Nunito', sans-serif;
  font-weight: 500;
  transition: border-color 0.2s, box-shadow 0.2s, background 0.4s;
  outline: none;
}
input::placeholder { color: var(--muted); font-weight: 400; }
input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(79,119,247,0.12);
}
.input-wrap:focus-within .input-icon { color: var(--accent); }

/* Buttons */
.btn {
  width: 100%; padding: 13px;
  border: none; border-radius: 12px;
  font-family: 'Nunito', sans-serif;
  font-size: 14px; font-weight: 800;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.2s, opacity 0.15s;
  position: relative; overflow: hidden;
  margin-top: 6px;
}
.btn:hover:not(:disabled) { transform: translateY(-2px); }
.btn:active { transform: translateY(0); }
.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white;
  box-shadow: 0 6px 24px rgba(79,119,247,0.35);
}
.btn-success {
  background: linear-gradient(135deg, #10b981, #059669);
  color: white;
  box-shadow: 0 6px 24px rgba(16,185,129,0.3);
}
.btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }

.btn .spinner {
  display: none; width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white; border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto;
}
.btn.loading .btn-text { display: none; }
.btn.loading .spinner { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Panels */
.panel { display: none; animation: fadeUp 0.3s ease both; }
.panel.active { display: block; }

/* Toast */
#toast {
  position: fixed; top: 24px; right: 24px;
  padding: 12px 18px; border-radius: 12px;
  font-size: 13px; font-weight: 600;
  display: none; z-index: 200;
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  animation: slideIn 0.3s ease;
  max-width: 290px;
  backdrop-filter: blur(10px);
}

@keyframes slideIn {
  from { transform: translateX(20px); opacity: 0; }
  to   { transform: translateX(0); opacity: 1; }
}
@keyframes fadeUp {
  from { transform: translateY(20px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}
@keyframes fadeDown {
  from { transform: translateY(-12px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}
</style>
</head>

    <div class="logo-name">🔐 <span>BIO VIP</span> ACCOUNT</div>
    <div class="logo-sub">Hệ thống xác thực cao cấp</div>
  </div>

  <div class="card">
    <!-- Tab switcher -->
    <div class="tabs">
      <button class="tab-btn active" id="tab-login" onclick="showLogin()">Đăng nhập</button>
      <button class="tab-btn" id="tab-register" onclick="showRegister()">Đăng ký</button>
    </div>

    <!-- LOGIN -->
    <div class="panel active" id="loginPanel">
      <div class="card-title">Chào mừng trở lại 👋</div>
      <div class="card-subtitle">Đăng nhập để truy cập tài khoản của bạn</div>

      <div class="field">
        <label>Email / Username</label>
        <div class="input-wrap">
          <span class="input-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg></span>
          <input id="l_email" type="text" placeholder="email@example.com">
        </div>
      </div>

      <div class="field">
        <label>Mật khẩu</label>
        <div class="input-wrap">
          <span class="input-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
          <input id="l_pass" type="password" placeholder="••••••••">
        </div>
      </div>

      <button class="btn btn-primary" id="loginBtn" onclick="login()">
        <span class="btn-text">Đăng nhập</span>
        <span class="spinner"></span>
      </button>
    </div>

    <!-- REGISTER -->
    <div class="panel" id="registerPanel">
      <div class="card-title">Tạo tài khoản mới ✨</div>
      <div class="card-subtitle">Điền thông tin để bắt đầu trải nghiệm</div>

      <div class="field">
        <label>Họ và tên</label>
        <div class="input-wrap">
          <span class="input-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
          <input id="name" type="text" placeholder="Nguyễn Văn A">
        </div>
      </div>

      <div class="field">
        <label>Email / Username</label>
        <div class="input-wrap">
          <span class="input-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg></span>
          <input id="email" type="text" placeholder="email@example.com">
        </div>
      </div>

      <div class="field">
        <label>Mật khẩu</label>
        <div class="input-wrap">
          <span class="input-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
          <input id="pass" type="password" placeholder="••••••••">
        </div>
      </div>

      <button class="btn btn-success" id="registerBtn" onclick="register()">
        <span class="btn-text">Tạo tài khoản</span>
        <span class="spinner"></span>
      </button>
    </div>

  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA-G3BfucCstuMlQDKDsQVu3daQ854tuCQ",
  authDomain: "csdl-login.firebaseapp.com",
  databaseURL: "https://csdl-login-default-rtdb.firebaseio.com/",
  projectId: "csdl-login",
  storageBucket: "csdl-login.firebasestorage.app",
  messagingSenderId: "1036020118468",
  appId: "1:1036020118468:web:8b25fa3cae3d2ee9986a91"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ---- Theme ----
window.toggleTheme = () => {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeIcon').textContent = isDark ? '🌙' : '☀️';
  document.getElementById('themeLabel').textContent = isDark ? 'Tối' : 'Sáng';
  localStorage.setItem('theme', isDark ? 'light' : 'dark');
};

// Restore saved theme (default: light)
const saved = localStorage.getItem('theme') || 'light';
document.documentElement.setAttribute('data-theme', saved);
document.getElementById('themeIcon').textContent = saved === 'dark' ? '☀️' : '🌙';
document.getElementById('themeLabel').textContent = saved === 'dark' ? 'Sáng' : 'Tối';

// ---- Toast ----
function toast(msg, type = "success") {
  const t = document.getElementById("toast");
  const cfg = {
    success: { icon: "✅", bg: "rgba(16,185,129,0.92)", border: "rgba(16,185,129,0.4)" },
    error:   { icon: "❌", bg: "rgba(239,68,68,0.92)",  border: "rgba(239,68,68,0.4)"  },
    info:    { icon: "ℹ️",  bg: "rgba(79,119,247,0.92)", border: "rgba(79,119,247,0.4)" }
  };
  const c = cfg[type];
  t.innerHTML = `${c.icon} ${msg}`;
  t.style.cssText = `display:block; background:${c.bg}; border-color:${c.border}; color:#fff;`;
  clearTimeout(t._t);
  t._t = setTimeout(() => t.style.display = "none", 3000);
}

// ---- Loading ----
function setLoading(btn, state) {
  btn.classList.toggle("loading", state);
  btn.disabled = state;
}

// ---- Tab switch ----
window.showLogin = () => {
  document.getElementById("loginPanel").classList.add("active");
  document.getElementById("registerPanel").classList.remove("active");
  document.getElementById("tab-login").classList.add("active");
  document.getElementById("tab-register").classList.remove("active");
};

window.showRegister = () => {
  document.getElementById("registerPanel").classList.add("active");
  document.getElementById("loginPanel").classList.remove("active");
  document.getElementById("tab-register").classList.add("active");
  document.getElementById("tab-login").classList.remove("active");
};

// ---- Register ----
window.register = async () => {
  const name  = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const pass  = document.getElementById("pass").value;
  const btn   = document.getElementById("registerBtn");

  if (!name || !email || !pass) { toast("Vui lòng điền đầy đủ thông tin", "error"); return; }
  if (pass.length < 6) { toast("Mật khẩu phải có ít nhất 6 ký tự", "error"); return; }

  setLoading(btn, true);
  try {
    // Check email trùng
    const snap = await get(ref(db, "users"));
    if (snap.exists()) {
      let duplicate = false;
      snap.forEach(c => { if (c.val().email === email) duplicate = true; });
      if (duplicate) { toast("Email này đã được đăng ký!", "error"); return; }
    }
    await set(ref(db, "users/" + Date.now()), { name, email, password: pass, role: "user" });
    toast("Đăng ký thành công! Hãy đăng nhập 🎉", "success");
    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
    document.getElementById("pass").value = "";
    setTimeout(showLogin, 1800);
  } catch(e) {
    toast("Lỗi kết nối, thử lại sau", "error");
  } finally {
    setLoading(btn, false);
  }
};

// ---- Login ----
window.login = async () => {
  const email = document.getElementById("l_email").value.trim();
  const pass  = document.getElementById("l_pass").value;
  const btn   = document.getElementById("loginBtn");

  if (!email || !pass) { toast("Vui lòng nhập đầy đủ thông tin", "error"); return; }

  setLoading(btn, true);
  try {
    const snap = await get(ref(db, "users"));
    if (!snap.exists()) { toast("Chưa có tài khoản nào", "error"); return; }

    let found = false;
    snap.forEach(child => {
      const u = child.val();
      if (u.email === email && u.password === pass) found = true;
    });

    if (found) {
      toast("Đăng nhập thành công! 🎉", "success");
      setTimeout(() => window.location.href = "HTML.vn", 1500);
    } else {
      toast("Email hoặc mật khẩu không đúng", "error");
    }
  } catch(e) {
    toast("Lỗi kết nối, thử lại sau", "error");
  } finally {
    setLoading(btn, false);
  }
};

// Enter key
document.addEventListener("keydown", e => {
  if (e.key !== "Enter") return;
  if (document.getElementById("loginPanel").classList.contains("active")) window.login();
  else window.register();
});
</script>
